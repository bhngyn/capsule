<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrW" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrV" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0d9488"/>
    </marker>
  </defs>
  <rect width="900" height="460" fill="#ffffff"/>

  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="600" fill="#1f2937">Two ways to build the same thing</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#64748b">Spec-first vibe coding ≠ "no plan, just chat." It's many small, recorded loops anchored on one spec.</text>

  <!-- Left column: Waterfall -->
  <text x="225" y="98" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">Traditional waterfall</text>
  <text x="225" y="116" text-anchor="middle" font-size="11" fill="#64748b">one long arrow, expensive corrections</text>

  <!-- Phases as long horizontal bars -->
  <g>
    <rect x="80" y="140" width="290" height="34" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
    <text x="100" y="161" font-size="11" fill="#1f2937">Requirements (weeks)</text>

    <rect x="80" y="180" width="290" height="34" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
    <text x="100" y="201" font-size="11" fill="#1f2937">Design (weeks)</text>

    <rect x="80" y="220" width="290" height="34" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
    <text x="100" y="241" font-size="11" fill="#1f2937">Implementation (weeks)</text>

    <rect x="80" y="260" width="290" height="34" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
    <text x="100" y="281" font-size="11" fill="#1f2937">Testing</text>

    <rect x="80" y="300" width="290" height="34" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
    <text x="100" y="321" font-size="11" fill="#1f2937">Release</text>
  </g>

  <!-- Long descending arrow -->
  <line x1="50" y1="140" x2="50" y2="334" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrW)"/>

  <!-- "Course correction" pain -->
  <line x1="370" y1="174" x2="370" y2="334" stroke="#dc2626" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="385" y="240" font-size="10" fill="#dc2626" font-style="italic">audience changes:</text>
  <text x="385" y="255" font-size="10" fill="#dc2626" font-style="italic">restart most of</text>
  <text x="385" y="270" font-size="10" fill="#dc2626" font-style="italic">the cascade</text>

  <text x="225" y="380" text-anchor="middle" font-size="11" fill="#475569">Cost of being wrong: weeks of unwound work.</text>
  <text x="225" y="396" text-anchor="middle" font-size="11" fill="#475569">Cost of asking a clarifying question: paid up front, in full.</text>

  <!-- Vertical divider -->
  <line x1="490" y1="80" x2="490" y2="420" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Right column: Vibe-coded loops -->
  <text x="695" y="98" text-anchor="middle" font-size="14" font-weight="600" fill="#0d9488">Spec-first vibe coding</text>
  <text x="695" y="116" text-anchor="middle" font-size="11" fill="#64748b">many small loops, anchored on one CLAUDE.md</text>

  <!-- 6 small loops -->
  <g>
    <!-- Each loop is a small arc with a label -->
    <g transform="translate(540 150)">
      <ellipse cx="40" cy="20" rx="34" ry="14" fill="none" stroke="#0d9488" stroke-width="1.5"/>
      <path d="M 74 20 a 34 14 0 0 1 -34 14" fill="none" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arrV)"/>
      <text x="40" y="24" text-anchor="middle" font-size="10.5" font-weight="600" fill="#0d9488">v0.1</text>
    </g>

    <g transform="translate(640 150)">
      <ellipse cx="40" cy="20" rx="34" ry="14" fill="none" stroke="#0d9488" stroke-width="1.5"/>
      <path d="M 74 20 a 34 14 0 0 1 -34 14" fill="none" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arrV)"/>
      <text x="40" y="24" text-anchor="middle" font-size="10.5" font-weight="600" fill="#0d9488">v0.2</text>
    </g>

    <g transform="translate(740 150)">
      <ellipse cx="40" cy="20" rx="34" ry="14" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
      <path d="M 74 20 a 34 14 0 0 1 -34 14" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrW)"/>
      <text x="40" y="24" text-anchor="middle" font-size="10.5" font-weight="600" fill="#475569">v0.3</text>
    </g>

    <g transform="translate(540 230)">
      <ellipse cx="40" cy="20" rx="34" ry="14" fill="none" stroke="#0d9488" stroke-width="1.5"/>
      <path d="M 74 20 a 34 14 0 0 1 -34 14" fill="none" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arrV)"/>
      <text x="40" y="24" text-anchor="middle" font-size="10.5" font-weight="600" fill="#0d9488">v0.4</text>
    </g>

    <g transform="translate(640 230)">
      <ellipse cx="40" cy="20" rx="34" ry="14" fill="none" stroke="#0d9488" stroke-width="1.5"/>
      <path d="M 74 20 a 34 14 0 0 1 -34 14" fill="none" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arrV)"/>
      <text x="40" y="24" text-anchor="middle" font-size="10.5" font-weight="600" fill="#0d9488">v0.5</text>
    </g>

    <g transform="translate(740 230)">
      <ellipse cx="40" cy="20" rx="34" ry="14" fill="none" stroke="#0d9488" stroke-width="1.5"/>
      <path d="M 74 20 a 34 14 0 0 1 -34 14" fill="none" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arrV)"/>
      <text x="40" y="24" text-anchor="middle" font-size="10.5" font-weight="600" fill="#0d9488">v0.6</text>
    </g>

    <g transform="translate(640 310)">
      <ellipse cx="40" cy="20" rx="34" ry="14" fill="none" stroke="#0d9488" stroke-width="1.5"/>
      <path d="M 74 20 a 34 14 0 0 1 -34 14" fill="none" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arrV)"/>
      <text x="40" y="24" text-anchor="middle" font-size="10.5" font-weight="600" fill="#0d9488">v0.7</text>
    </g>
  </g>

  <!-- Anchor: CLAUDE.md beneath the loops -->
  <line x1="510" y1="358" x2="880" y2="358" stroke="#0d9488" stroke-width="2"/>
  <text x="695" y="378" text-anchor="middle" font-size="12" font-weight="600" fill="#0d9488">CLAUDE.md (the spec, read every loop, updated every loop)</text>

  <text x="695" y="404" text-anchor="middle" font-size="11" fill="#475569">Cost of being wrong: one loop. Cost of changing course: a sentence.</text>
  <text x="695" y="420" text-anchor="middle" font-size="11" fill="#475569">v0.3 pruned features that v0.7 brought back. The round-trip was cheap.</text>
</svg>
