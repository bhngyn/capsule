<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrM" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0d9488"/>
    </marker>
  </defs>
  <rect width="640" height="640" fill="#ffffff"/>

  <text x="320" y="36" text-anchor="middle" font-size="18" font-weight="600" fill="#1f2937">The vibe-coding loop</text>
  <text x="320" y="58" text-anchor="middle" font-size="12" fill="#64748b">A spec-anchored cycle. Every turn through the loop, the spec gets sharper.</text>

  <!-- Center -->
  <circle cx="320" cy="340" r="86" fill="#ecfdf5" stroke="#0d9488" stroke-width="2"/>
  <text x="320" y="332" text-anchor="middle" font-size="14" font-weight="700" fill="#0d9488">CLAUDE.md</text>
  <text x="320" y="354" text-anchor="middle" font-size="11" fill="#0d9488">the constitution</text>
  <text x="320" y="372" text-anchor="middle" font-size="10" fill="#64748b">read before each task</text>

  <!-- 5 nodes around the circle. Center (320,340), radius 230. -->
  <!-- Angles (degrees, 0 = top, clockwise): 0, 72, 144, 216, 288 -->
  <!-- 0°  top:        x=320,         y=340-230=110  → (320,110)
       72°:           x=320+230*sin(72)=320+218.7=538.7  y=340-230*cos(72)=340-71.1=268.9
       144°:          x=320+230*sin(144)=320+135.1=455.1  y=340-230*cos(144)=340+186.1=526.1
       216°:          x=320+230*sin(216)=320-135.1=184.9  y=340-230*cos(216)=340+186.1=526.1
       288°:          x=320+230*sin(288)=320-218.7=101.3  y=340-230*cos(288)=340-71.1=268.9
  -->

  <!-- Node 1: Plan -->
  <g>
    <circle cx="320" cy="110" r="64" fill="#ffffff" stroke="#1f2937" stroke-width="1.5"/>
    <text x="320" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">1 · Plan</text>
    <text x="320" y="120" text-anchor="middle" font-size="10.5" fill="#64748b">Plan mode.</text>
    <text x="320" y="135" text-anchor="middle" font-size="10.5" fill="#64748b">Explore × parallel.</text>
    <text x="320" y="150" text-anchor="middle" font-size="10.5" fill="#64748b">AskUserQuestion.</text>
  </g>

  <!-- Node 2: Implement -->
  <g>
    <circle cx="539" cy="269" r="64" fill="#ffffff" stroke="#1f2937" stroke-width="1.5"/>
    <text x="539" y="259" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">2 · Implement</text>
    <text x="539" y="279" text-anchor="middle" font-size="10.5" fill="#64748b">Edit · Write · test</text>
    <text x="539" y="294" text-anchor="middle" font-size="10.5" fill="#64748b">in tight loops.</text>
  </g>

  <!-- Node 3: Verify -->
  <g>
    <circle cx="455" cy="526" r="64" fill="#ffffff" stroke="#1f2937" stroke-width="1.5"/>
    <text x="455" y="516" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">3 · Verify</text>
    <text x="455" y="536" text-anchor="middle" font-size="10.5" fill="#64748b">Run it. Read logs.</text>
    <text x="455" y="551" text-anchor="middle" font-size="10.5" fill="#64748b">Confirm in browser.</text>
  </g>

  <!-- Node 4: Version -->
  <g>
    <circle cx="185" cy="526" r="64" fill="#ffffff" stroke="#1f2937" stroke-width="1.5"/>
    <text x="185" y="516" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">4 · Version</text>
    <text x="185" y="536" text-anchor="middle" font-size="10.5" fill="#64748b">Conventional commit.</text>
    <text x="185" y="551" text-anchor="middle" font-size="10.5" fill="#64748b">Bump v0.x label.</text>
  </g>

  <!-- Node 5: Record -->
  <g>
    <circle cx="101" cy="269" r="64" fill="#ffffff" stroke="#1f2937" stroke-width="1.5"/>
    <text x="101" y="259" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">5 · Record</text>
    <text x="101" y="279" text-anchor="middle" font-size="10.5" fill="#64748b">Append §15 entry.</text>
    <text x="101" y="294" text-anchor="middle" font-size="10.5" fill="#64748b">Why &amp; what changed.</text>
  </g>

  <!-- Arrows around the loop. They follow the perimeter, not straight chords. -->
  <!-- Use SVG arcs offset slightly outside the radius -->

  <!-- 1 -> 2 -->
  <path d="M 372 158 A 240 240 0 0 1 502 220" fill="none" stroke="#0d9488" stroke-width="2" marker-end="url(#arrM)"/>

  <!-- 2 -> 3 -->
  <path d="M 559 333 A 240 240 0 0 1 502 478" fill="none" stroke="#0d9488" stroke-width="2" marker-end="url(#arrM)"/>

  <!-- 3 -> 4 -->
  <path d="M 392 562 A 240 240 0 0 1 247 561" fill="none" stroke="#0d9488" stroke-width="2" marker-end="url(#arrM)"/>

  <!-- 4 -> 5 -->
  <path d="M 137 478 A 240 240 0 0 1 81 333" fill="none" stroke="#0d9488" stroke-width="2" marker-end="url(#arrM)"/>

  <!-- 5 -> 1 -->
  <path d="M 138 220 A 240 240 0 0 1 268 158" fill="none" stroke="#0d9488" stroke-width="2" marker-end="url(#arrM)"/>

  <!-- Spokes from center -->
  <line x1="320" y1="254" x2="320" y2="174" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="396" y1="296" x2="475" y2="269" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="376" y1="408" x2="430" y2="466" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="265" y1="408" x2="210" y2="466" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="245" y1="296" x2="166" y2="269" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 2"/>
</svg>
