<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/>
    </marker>
    <pattern id="dots" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="#cbd5e1"/>
    </pattern>
  </defs>

  <rect width="720" height="720" fill="#ffffff"/>

  <!-- Title -->
  <text x="360" y="40" text-anchor="middle" font-size="18" font-weight="600" fill="#1f2937">Capsule — runtime architecture</text>
  <text x="360" y="62" text-anchor="middle" font-size="12" fill="#64748b">One Docker container, two bind-mounts, one URL: localhost:8080</text>

  <!-- Browser layer -->
  <rect x="180" y="90" width="360" height="80" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="1.5"/>
  <text x="360" y="118" text-anchor="middle" font-size="14" font-weight="600" fill="#1f2937">User's browser</text>
  <text x="360" y="138" text-anchor="middle" font-size="11" fill="#64748b">http://localhost:8080</text>
  <text x="360" y="156" text-anchor="middle" font-size="11" fill="#64748b">Tailwind + Alpine.js, REST + Server-Sent Events</text>

  <!-- Arrow down -->
  <line x1="360" y1="170" x2="360" y2="200" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Docker container -->
  <rect x="60" y="210" width="600" height="370" rx="10" fill="#f8fafc" stroke="#0d9488" stroke-width="2"/>
  <text x="80" y="234" font-size="11" font-weight="600" fill="#0d9488" letter-spacing="0.5">DOCKER CONTAINER &nbsp;·&nbsp; capsule:&lt;arch&gt;</text>

  <!-- FastAPI box -->
  <rect x="80" y="250" width="560" height="80" rx="6" fill="#ffffff" stroke="#1f2937" stroke-width="1.5"/>
  <text x="100" y="274" font-size="13" font-weight="600" fill="#1f2937">FastAPI backend (Python 3.12)</text>
  <text x="100" y="295" font-size="10.5" fill="#64748b">/api/jobs/batch · /api/jobs/{id}/events (SSE) · /api/cases · /api/library · /api/cookies</text>
  <text x="100" y="312" font-size="10.5" fill="#64748b">/api/system/version · /api/system/profile · /api/audit · /api/extension/* · /api/i18n/{lang}</text>

  <!-- Capture pipeline -->
  <rect x="80" y="345" width="560" height="135" rx="6" fill="#ffffff" stroke="#1f2937" stroke-width="1.5"/>
  <text x="100" y="367" font-size="13" font-weight="600" fill="#1f2937">Capture pipeline (per URL, sequential)</text>

  <!-- 4 phases as inline blocks -->
  <g font-size="10.5" fill="#1f2937">
    <rect x="100" y="384" width="115" height="78" rx="4" fill="#ecfdf5" stroke="#0d9488" stroke-width="1"/>
    <text x="157" y="402" text-anchor="middle" font-weight="600">1. Classify</text>
    <text x="157" y="420" text-anchor="middle" font-size="9.5" fill="#64748b">resolve URL,</text>
    <text x="157" y="434" text-anchor="middle" font-size="9.5" fill="#64748b">redirects, platform,</text>
    <text x="157" y="448" text-anchor="middle" font-size="9.5" fill="#64748b">match cookies</text>

    <rect x="225" y="384" width="115" height="78" rx="4" fill="#ecfdf5" stroke="#0d9488" stroke-width="1"/>
    <text x="282" y="402" text-anchor="middle" font-weight="600">2. Page capture</text>
    <text x="282" y="420" text-anchor="middle" font-size="9.5" fill="#64748b">Playwright +</text>
    <text x="282" y="434" text-anchor="middle" font-size="9.5" fill="#64748b">CDP→WARC writer:</text>
    <text x="282" y="448" text-anchor="middle" font-size="9.5" fill="#64748b">MHTML · PNG · WARC</text>

    <rect x="350" y="384" width="115" height="78" rx="4" fill="#ecfdf5" stroke="#0d9488" stroke-width="1"/>
    <text x="407" y="402" text-anchor="middle" font-weight="600">3. Media / gallery</text>
    <text x="407" y="420" text-anchor="middle" font-size="9.5" fill="#64748b">yt-dlp →</text>
    <text x="407" y="434" text-anchor="middle" font-size="9.5" fill="#64748b">gallery-dl fallback</text>
    <text x="407" y="448" text-anchor="middle" font-size="9.5" fill="#64748b">(may yield zero)</text>

    <rect x="475" y="384" width="145" height="78" rx="4" fill="#ecfdf5" stroke="#0d9488" stroke-width="1"/>
    <text x="547" y="402" text-anchor="middle" font-weight="600">4. Postprocess</text>
    <text x="547" y="420" text-anchor="middle" font-size="9.5" fill="#64748b">hash, sign meta.json,</text>
    <text x="547" y="434" text-anchor="middle" font-size="9.5" fill="#64748b">render PDFs, write</text>
    <text x="547" y="448" text-anchor="middle" font-size="9.5" fill="#64748b">audit-log entry</text>
  </g>

  <!-- SQLite + filesystem -->
  <rect x="80" y="495" width="270" height="70" rx="6" fill="#ffffff" stroke="#1f2937" stroke-width="1.5"/>
  <text x="100" y="517" font-size="13" font-weight="600" fill="#1f2937">SQLite library</text>
  <text x="100" y="534" font-size="10.5" fill="#64748b">cases · downloads · audit_log</text>
  <text x="100" y="550" font-size="10.5" fill="#64748b">(audit_log: hash-chained, append-only)</text>

  <rect x="370" y="495" width="270" height="70" rx="6" fill="#ffffff" stroke="#1f2937" stroke-width="1.5"/>
  <text x="390" y="517" font-size="13" font-weight="600" fill="#1f2937">Per-item folders</text>
  <text x="390" y="534" font-size="10.5" fill="#64748b">media · MHTML · PNG · WARC · HAR ·</text>
  <text x="390" y="550" font-size="10.5" fill="#64748b">meta.json + .sig · checksums · 2 PDFs</text>

  <!-- Arrow down -->
  <line x1="200" y1="580" x2="200" y2="610" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="520" y1="580" x2="520" y2="610" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Bind mounts -->
  <rect x="80" y="615" width="240" height="75" rx="8" fill="url(#dots)" stroke="#1f2937" stroke-width="1.5"/>
  <text x="200" y="643" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">/config (host bind-mount)</text>
  <text x="200" y="662" text-anchor="middle" font-size="10.5" fill="#64748b">SQLite · keys · cookies · logs</text>
  <text x="200" y="678" text-anchor="middle" font-size="10.5" fill="#64748b">~/.capsule-config on host</text>

  <rect x="400" y="615" width="240" height="75" rx="8" fill="url(#dots)" stroke="#1f2937" stroke-width="1.5"/>
  <text x="520" y="643" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">/downloads (host bind-mount)</text>
  <text x="520" y="662" text-anchor="middle" font-size="10.5" fill="#64748b">organized as /downloads/&lt;case&gt;/</text>
  <text x="520" y="678" text-anchor="middle" font-size="10.5" fill="#64748b">~/Documents/Capsule on host</text>
</svg>
