<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/>
    </marker>
  </defs>
  <rect width="960" height="460" fill="#ffffff"/>

  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="600" fill="#1f2937">Reproducible build → self-healing distribution</text>
  <text x="480" y="58" text-anchor="middle" font-size="12" fill="#64748b">scripts/build-dist.sh stamps each launcher with the digest of the image bundled next to it.</text>

  <!-- Source -->
  <rect x="40" y="100" width="160" height="80" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="1.5"/>
  <text x="120" y="128" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">Source</text>
  <text x="120" y="148" text-anchor="middle" font-size="10.5" fill="#64748b">Dockerfile</text>
  <text x="120" y="164" text-anchor="middle" font-size="10.5" fill="#64748b">app/, dist-templates/</text>

  <line x1="200" y1="140" x2="240" y2="140" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- buildx multi-arch -->
  <rect x="240" y="80" width="200" height="50" rx="8" fill="#ecfdf5" stroke="#0d9488" stroke-width="1.5"/>
  <text x="340" y="111" text-anchor="middle" font-size="12" font-weight="600" fill="#0d9488">docker buildx · linux/arm64</text>

  <rect x="240" y="150" width="200" height="50" rx="8" fill="#ecfdf5" stroke="#0d9488" stroke-width="1.5"/>
  <text x="340" y="181" text-anchor="middle" font-size="12" font-weight="600" fill="#0d9488">docker buildx · linux/amd64</text>

  <line x1="440" y1="105" x2="480" y2="105" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arr3)"/>
  <line x1="440" y1="175" x2="480" y2="175" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- Image saved -->
  <rect x="480" y="80" width="180" height="50" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="1.5"/>
  <text x="570" y="103" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1f2937">capsule:arm64</text>
  <text x="570" y="120" text-anchor="middle" font-size="10" fill="#64748b">docker save | gzip ⇒ .tar.gz</text>

  <rect x="480" y="150" width="180" height="50" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="1.5"/>
  <text x="570" y="173" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1f2937">capsule:amd64</text>
  <text x="570" y="190" text-anchor="middle" font-size="10" fill="#64748b">docker save | gzip ⇒ .tar.gz</text>

  <!-- Digest stamp -->
  <rect x="480" y="220" width="180" height="60" rx="8" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
  <text x="570" y="243" text-anchor="middle" font-size="11.5" font-weight="600" fill="#92400e">capture image digest</text>
  <text x="570" y="261" text-anchor="middle" font-size="9.5" fill="#92400e" font-family="monospace">sha256:1f4c0…ab9</text>
  <text x="570" y="274" text-anchor="middle" font-size="9.5" fill="#92400e">(per arch)</text>

  <line x1="570" y1="200" x2="570" y2="218" stroke="#b45309" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="570" y1="130" x2="570" y2="148" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- render_launcher -->
  <line x1="660" y1="250" x2="710" y2="250" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arr3)"/>

  <rect x="710" y="220" width="220" height="60" rx="8" fill="#ecfdf5" stroke="#0d9488" stroke-width="1.5"/>
  <text x="820" y="244" text-anchor="middle" font-size="12" font-weight="600" fill="#0d9488">render_launcher()</text>
  <text x="820" y="262" text-anchor="middle" font-size="10" fill="#64748b">sed -e "s/@@DIGEST@@/$digest/g"</text>
  <text x="820" y="275" text-anchor="middle" font-size="10" fill="#64748b">dist-templates/Capsule.{command,bat}.in</text>

  <line x1="820" y1="220" x2="820" y2="180" stroke="#1f2937" stroke-width="1.5"/>
  <line x1="820" y1="180" x2="660" y2="180" stroke="#1f2937" stroke-width="1.5" stroke-dasharray="3 2"/>

  <text x="820" y="170" text-anchor="middle" font-size="9.5" fill="#64748b" font-style="italic">templates pulled in</text>

  <!-- Dist bundle layout -->
  <rect x="40" y="320" width="880" height="120" rx="8" fill="#f8fafc" stroke="#1f2937" stroke-width="1.5"/>
  <text x="60" y="343" font-size="11" font-weight="600" fill="#0d9488" letter-spacing="0.5">SHIPPED BUNDLE — dist/Capsule-mac-applesilicon/</text>

  <!-- File list inside bundle -->
  <g font-family="ui-monospace, monospace" font-size="10.5" fill="#1f2937">
    <text x="80" y="368">Capsule.command</text>
    <rect x="220" y="358" width="120" height="14" rx="2" fill="#fef3c7"/>
    <text x="226" y="368" font-size="9.5" fill="#92400e">stamped digest</text>
    <text x="360" y="368" fill="#64748b">— launcher checks loaded image vs. stamped digest</text>

    <text x="80" y="388">images/capsule-arm64.tar.gz</text>
    <text x="280" y="388" fill="#64748b">— ~430 MB; loaded on first launch</text>

    <text x="80" y="408">README.txt</text>
    <text x="220" y="408" fill="#64748b">— "double-click Capsule.command. Then open localhost:8080."</text>

    <text x="80" y="428">docs/quickstart.{en,ar,ja,es}.pdf</text>
    <text x="280" y="428" fill="#64748b">— locale-aware, copied verbatim from /docs/</text>
  </g>
</svg>
