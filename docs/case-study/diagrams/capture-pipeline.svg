<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0d9488"/>
    </marker>
  </defs>
  <rect width="960" height="320" fill="#ffffff"/>

  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="600" fill="#1f2937">The four-phase capture, every URL, every time</text>
  <text x="480" y="58" text-anchor="middle" font-size="12" fill="#64748b">A page snapshot is preserved even if no media downloads. Every artifact is hashed and the bundle is signed.</text>

  <!-- Pipeline -->
  <g>
    <!-- Phase boxes -->
    <g>
      <!-- 1. Globe / classify -->
      <circle cx="140" cy="160" r="46" fill="#ecfdf5" stroke="#0d9488" stroke-width="2"/>
      <g transform="translate(116,136)" stroke="#0d9488" stroke-width="2" fill="none">
        <circle cx="24" cy="24" r="20"/>
        <ellipse cx="24" cy="24" rx="20" ry="8"/>
        <ellipse cx="24" cy="24" rx="8" ry="20"/>
        <line x1="4" y1="24" x2="44" y2="24"/>
      </g>
      <text x="140" y="240" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">Classify</text>
      <text x="140" y="259" text-anchor="middle" font-size="10.5" fill="#64748b">Resolve redirects.</text>
      <text x="140" y="274" text-anchor="middle" font-size="10.5" fill="#64748b">Identify platform.</text>
      <text x="140" y="289" text-anchor="middle" font-size="10.5" fill="#64748b">Attach cookies.</text>
    </g>

    <line x1="200" y1="160" x2="270" y2="160" stroke="#0d9488" stroke-width="2" marker-end="url(#arr2)"/>

    <g>
      <!-- 2. Download cloud / page -->
      <circle cx="320" cy="160" r="46" fill="#ecfdf5" stroke="#0d9488" stroke-width="2"/>
      <g transform="translate(294,140)" stroke="#0d9488" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 28 a10 10 0 1 1 4 -19 a14 14 0 0 1 26 4 a8 8 0 0 1 4 15 z"/>
        <line x1="26" y1="22" x2="26" y2="36"/>
        <polyline points="20,30 26,36 32,30"/>
      </g>
      <text x="320" y="240" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">Page snapshot</text>
      <text x="320" y="259" text-anchor="middle" font-size="10.5" fill="#64748b">MHTML · full-page PNG ·</text>
      <text x="320" y="274" text-anchor="middle" font-size="10.5" fill="#64748b">WARC · HAR · console ·</text>
      <text x="320" y="289" text-anchor="middle" font-size="10.5" fill="#64748b">media-context PNG</text>
    </g>

    <line x1="380" y1="160" x2="450" y2="160" stroke="#0d9488" stroke-width="2" marker-end="url(#arr2)"/>

    <g>
      <!-- 3. Hash sign / media -->
      <circle cx="500" cy="160" r="46" fill="#ecfdf5" stroke="#0d9488" stroke-width="2"/>
      <g transform="translate(478,138)" stroke="#0d9488" stroke-width="2" fill="none" stroke-linecap="round">
        <line x1="6" y1="14" x2="38" y2="14"/>
        <line x1="6" y1="30" x2="38" y2="30"/>
        <line x1="14" y1="6" x2="14" y2="38"/>
        <line x1="30" y1="6" x2="30" y2="38"/>
      </g>
      <text x="500" y="240" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">Media / gallery</text>
      <text x="500" y="259" text-anchor="middle" font-size="10.5" fill="#64748b">yt-dlp first;</text>
      <text x="500" y="274" text-anchor="middle" font-size="10.5" fill="#64748b">gallery-dl fallback.</text>
      <text x="500" y="289" text-anchor="middle" font-size="10.5" fill="#64748b">Zero files is OK.</text>
    </g>

    <line x1="560" y1="160" x2="630" y2="160" stroke="#0d9488" stroke-width="2" marker-end="url(#arr2)"/>

    <g>
      <!-- 4. Shield / sign -->
      <circle cx="680" cy="160" r="46" fill="#ecfdf5" stroke="#0d9488" stroke-width="2"/>
      <g transform="translate(658,136)" stroke="#0d9488" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 4 L40 12 V24 C40 36 30 44 22 46 C14 44 4 36 4 24 V12 Z"/>
        <polyline points="14,24 21,30 32,18"/>
      </g>
      <text x="680" y="240" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">Postprocess</text>
      <text x="680" y="259" text-anchor="middle" font-size="10.5" fill="#64748b">MD5 + SHA-256 every</text>
      <text x="680" y="274" text-anchor="middle" font-size="10.5" fill="#64748b">artifact · sign meta.json ·</text>
      <text x="680" y="289" text-anchor="middle" font-size="10.5" fill="#64748b">render 2 PDFs · audit row</text>
    </g>

    <line x1="740" y1="160" x2="810" y2="160" stroke="#0d9488" stroke-width="2" marker-end="url(#arr2)"/>

    <g>
      <!-- 5. Output -->
      <circle cx="860" cy="160" r="46" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
      <g transform="translate(838,138)" stroke="#1f2937" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="6" y="6" width="32" height="36" rx="3"/>
        <line x1="12" y1="16" x2="32" y2="16"/>
        <line x1="12" y1="24" x2="32" y2="24"/>
        <line x1="12" y1="32" x2="24" y2="32"/>
      </g>
      <text x="860" y="240" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">Per-item folder</text>
      <text x="860" y="259" text-anchor="middle" font-size="10.5" fill="#64748b">Self-contained,</text>
      <text x="860" y="274" text-anchor="middle" font-size="10.5" fill="#64748b">portable, signed.</text>
      <text x="860" y="289" text-anchor="middle" font-size="10.5" fill="#64748b">Verifier bundled.</text>
    </g>
  </g>
</svg>
