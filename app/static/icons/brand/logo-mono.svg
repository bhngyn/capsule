<?xml version="1.0" encoding="UTF-8"?>
<!--
  Capsule brand mark — single-color variant.

  For PDF reports (rendered by WeasyPrint on white) and any printed or
  embossed surface. Drops the glass highlight and the accent dot so the
  whole mark is one ink. Hardcoded to slate-800 (#1e293b) so it sits
  comfortably on the cream/white paper of the export PDF.

  The browser-page specimen floats inside the dome; the chrome bar and
  page-content lines make it read clearly as a webpage.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
     stroke="#1e293b" stroke-width="1.5"
     stroke-linecap="round" stroke-linejoin="round"
     role="img" aria-label="Capsule">

  <rect x="2.75" y="20.5" width="18.5" height="2" rx="0.5"
        fill="#1e293b" fill-opacity="0.15" stroke-width="1.5"/>

  <path d="M 5.25 20.5 L 5.25 11.5 Q 5.25 4.25 12 4.25 Q 18.75 4.25 18.75 11.5 L 18.75 20.5"/>

  <line x1="12" y1="4.25" x2="12" y2="2.85"/>
  <circle cx="12" cy="2.1" r="0.85" fill="#1e293b" stroke="none"/>

  <rect x="7.5" y="8" width="9" height="8" rx="0.7" stroke-width="1.4"/>
  <line x1="7.5" y1="10.5" x2="16.5" y2="10.5" stroke-width="1.2"/>

  <circle cx="8.4"  cy="9.25" r="0.42" fill="#1e293b" stroke="none"/>
  <circle cx="9.3"  cy="9.25" r="0.42" fill="#1e293b" fill-opacity="0.55" stroke="none"/>
  <circle cx="10.2" cy="9.25" r="0.42" fill="#1e293b" fill-opacity="0.55" stroke="none"/>

  <line x1="8.7" y1="12.6" x2="15.3" y2="12.6"
        stroke-width="0.9" stroke-opacity="0.55"/>
  <line x1="8.7" y1="14"   x2="13.5" y2="14"
        stroke-width="0.9" stroke-opacity="0.55"/>
</svg>
