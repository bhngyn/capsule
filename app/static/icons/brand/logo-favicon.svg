<?xml version="1.0" encoding="UTF-8"?>
<!--
  Capsule favicon — 16-pixel-tuned simplification.

  Drops the finial detail, the traffic-light dots, and the glass
  highlight. Keeps only what survives at favicon size: dome silhouette,
  plinth, and a clearly-chrome-bar'd browser-page floating inside.
  Strokes bumped to 1.8/2.0 for legibility against busy browser-tab
  backgrounds.

  Adapts to the OS theme via prefers-color-scheme.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
     stroke-linecap="round" stroke-linejoin="round"
     role="img" aria-label="Capsule">
  <style>
    .mark   { stroke: #1e293b; }
    .plinth { fill: #1e293b; fill-opacity: 0.18; }
    @media (prefers-color-scheme: dark) {
      .mark   { stroke: #e2e8f0; }
      .plinth { fill: #e2e8f0; fill-opacity: 0.20; }
    }
  </style>

  <!-- Plinth -->
  <rect class="mark plinth" x="2.5" y="20" width="19" height="2.5" rx="0.6"
        stroke-width="2"/>

  <!-- Bell-jar dome (slightly squatter for chunky 16px legibility) -->
  <path class="mark"
        d="M 5 20 L 5 11.5 Q 5 4 12 4 Q 19 4 19 11.5 L 19 20"
        stroke-width="2"/>

  <!-- Floating browser-page specimen with a clear chrome bar.
       At 16px we drop the dots and content lines; the chrome divider
       alone is enough to read as a window. -->
  <rect class="mark" x="6.75" y="7.5" width="10.5" height="9" rx="0.9"
        stroke-width="1.8"/>
  <line class="mark" x1="6.75" y1="10.5" x2="17.25" y2="10.5"
        stroke-width="1.6"/>
</svg>
