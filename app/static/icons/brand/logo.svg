<?xml version="1.0" encoding="UTF-8"?>
<!--
  Capsule brand mark — bell jar with a floating browser-page specimen.

  Spirit (CLAUDE.md §1, docs/DESIGN.md §1): a museum-coded glass cloche
  preserves a snapshot of a webpage suspended inside it — capture,
  preserve, proof, longevity. Volumetric and organic, never reads as
  a UI button. The specimen floats in the dome's interior (off the
  plinth) to read as "preserved in place," not "set on a shelf."

  Color contract:
    - Mark uses currentColor; set the parent text color (graphite for
      the app: `text-zinc-300`).
    - The accent dot inside the chrome bar uses rgb(var(--accent))
      (teal-600). Standalone fallback is teal-600.
    - The optional glass highlight gets `rtl:scale-x-[-1]` from the
      embedding parent in RTL, so the implied light source moves to the
      upper-right; the rest of the mark is symmetric.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
     stroke="currentColor" stroke-width="1.5"
     stroke-linecap="round" stroke-linejoin="round"
     role="img" aria-label="Capsule">
  <style>
    .accent-dot { fill: rgb(var(--accent, 13 148 136)); }
  </style>

  <!-- Plinth -->
  <rect x="2.75" y="20.5" width="18.5" height="2" rx="0.5"
        fill="currentColor" fill-opacity="0.15" stroke-width="1.5"/>

  <!-- Bell-jar dome: straight sides, rounded shoulders, flat-ish top -->
  <path d="M 5.25 20.5 L 5.25 11.5 Q 5.25 4.25 12 4.25 Q 18.75 4.25 18.75 11.5 L 18.75 20.5"/>

  <!-- Finial: stem + ball at the top -->
  <line x1="12" y1="4.25" x2="12" y2="2.85"/>
  <circle cx="12" cy="2.1" r="0.85" fill="currentColor" stroke="none"/>

  <!-- Glass highlight: implies a light source upper-left.
       Mirrored to upper-right under RTL via parent rtl:scale-x-[-1]. -->
  <path class="glass-highlight" d="M 7.4 8 Q 6.5 9.5 6.5 11.5"
        stroke-width="0.85" stroke-opacity="0.55"/>

  <!-- Floating browser-page specimen: window outline + chrome bar with
       traffic-light dots + page-content lines. -->
  <rect x="7.5" y="8" width="9" height="8" rx="0.7" stroke-width="1.4"/>
  <line x1="7.5" y1="10.5" x2="16.5" y2="10.5" stroke-width="1.2"/>

  <circle class="accent-dot" cx="8.4" cy="9.25" r="0.42" stroke="none"/>
  <circle cx="9.3"  cy="9.25" r="0.42" fill="currentColor" fill-opacity="0.55" stroke="none"/>
  <circle cx="10.2" cy="9.25" r="0.42" fill="currentColor" fill-opacity="0.55" stroke="none"/>

  <line x1="8.7" y1="12.6" x2="15.3" y2="12.6"
        stroke-width="0.9" stroke-opacity="0.55"/>
  <line x1="8.7" y1="14"   x2="13.5" y2="14"
        stroke-width="0.9" stroke-opacity="0.55"/>
</svg>
